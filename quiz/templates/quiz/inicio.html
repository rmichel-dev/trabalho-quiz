{% extends 'quiz/base_quiz.html' %}

{% block conteudo %}
<div class="card shadow-sm">
    <div class="card-body p-4">
        <h2 class="card-title mb-3">Bem-vindo à prova!</h2>
        <p class="text-muted">
            Você vai responder <strong>10 questões sorteadas</strong> da base
            ({{ total_questoes }} questões cadastradas).
            No final poderá baixar o resultado em PDF.
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="aluno" class="form-label">Seu nome completo</label>
                <input type="text" class="form-control" id="aluno" name="aluno" required>
            </div>
            <button type="submit" class="btn btn-primary">Iniciar prova</button>
        </form>
    </div>
</div>
{% endblock %}
